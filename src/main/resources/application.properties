# ── Application ─────────────────────────────────────────────────────────────
spring.application.name=ms-auth
server.port=8081
spring.profiles.active=dev

# ── DataSource (H2 in-memory) ────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 Console ──────────────────────────────────────────────────────────────
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── JWT ─────────────────────────────────────────────────────────────────────
# Must be set via environment variables — no fallback to prevent accidental exposure
app.jwt.secret-master=${APP_JWT_SECRET_MASTER}
app.jwt.secret-session=${APP_JWT_SECRET_SESSION}
app.jwt.master-expiration-ms=86400000
app.jwt.session-expiration-ms=900000

# ── Feign clients ────────────────────────────────────────────────────────────
ms-practica.url=${MS_PRACTICA_URL:http://localhost:8082}

# ── CORS ─────────────────────────────────────────────────────────────────────
# Override via env var in production (e.g. https://myfrontend.com)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
# Disabled by default — enable only in dev via application-dev.properties
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}

# Dev-only values — loaded when spring.profiles.active=dev
# These override the env-var references in application.properties for local development.
# NEVER copy these values to production.
app.jwt.secret-master=dev-master-secret-key-for-local-development-only-x
app.jwt.secret-session=dev-session-secret-key-for-local-development-only-x
spring.h2.console.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
